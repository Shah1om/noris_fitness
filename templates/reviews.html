{% extends "base.html" %}

{% block title %}Отзывы - НОРИС Фитнес{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="text-center mb-5" data-aos="fade-up">Отзывы наших клиентов</h1>
    <div class="row">
        {% for review in reviews %}
        <div class="col-md-8 mx-auto mb-4" data-aos="fade-up" data-aos-delay="{{ loop.index * 100 }}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">{{ review.name }}</h4>
                        <small class="text-muted">{{ review.date }}</small>
                    </div>
                    <p class="card-text">{{ review.text }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Форма добавления отзыва -->
    <div class="row mt-5">
        <div class="col-md-8 mx-auto">
            <div class="card bg-light">
                <div class="card-body">
                    <h4 class="text-center mb-4">Оставить отзыв</h4>
                    <form id="reviewForm">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Ваше имя" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="4" placeholder="Ваш отзыв" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Отправить отзыв</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
