{% extends "base.html" %}
{% block title %}Новости{% endblock %}
{% block content %}
<div class="container py-5">
    <h1 class="text-center mb-5">Новости</h1>
    <div class="row">
        {% for item in news %}
        <div class="col-md-8 mx-auto mb-4">
            <div class="card">
                <div class="card-body">
                    <h4>{{ item.title }}</h4>
                    <p class="text-muted"><i class="far fa-calendar-alt me-2"></i>{{ item.date }}</p>
                    <p>{{ item.text }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
